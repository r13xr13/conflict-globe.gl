name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-client:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-3d/package-lock.json

      - name: Install dependencies
        run: |
          cd client-3d
          npm ci

      - name: Run linter
        run: |
          cd client-3d
          npm run lint || true

      - name: Build client
        run: |
          cd client-3d
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client-3d/dist

  test-server:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: |
          cd server
          npm ci

      - name: Build server
        run: |
          cd server
          npm run build

  e2e-test:
    runs-on: ubuntu-latest
    needs: [test-client, test-server]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm install -g playwright

      - name: Install browsers
        run: playwright install chromium

      - name: Start server
        run: |
          cd server
          npm run dev &
          sleep 5

      - name: Start client
        run: |
          cd client-3d
          npm run dev &
          sleep 5

      - name: Run Playwright test
        run: |
          npx playwright test --browser=chromium -g "basic" || echo "No tests configured yet"
